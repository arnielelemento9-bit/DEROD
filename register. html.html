<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Page</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        background: lightgray;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .card {
        background: white;
        width: 350px;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 9px 15px rgba(0,0,0,0.9);
    }

    h3 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 30px;
    }

    .form-group {
        margin-bottom: 20px;
        width: 100%;
    }

    label {
        font-size: 14px;
        font-weight: bold;
    }

    input[type="text"],
    input[type="password"],
    input[type="date"] {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border: 1px solid black;
        border-radius: 6px;
        font-size: 15px;
        box-sizing: border-box;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        background: #0d6efd;
        color: white;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.9s ease;
    }

    button:hover {
        background: white;
        color: #0d6efd;
    }

    button:active {
        background: #0d6efd;
        color: black;
    }

    a {
        text-decoration: none;
    }

    .error {
        color: red;
        font-size: 12px;
        margin-top: 5px;
    }
</style>
<body>
    <div class="card">
        <h3>Registration</h3>

        <form id="registrationForm">
            <div class="form-group">
                <label for="completeName">Complete Name</label>
                <input type="text" id="completeName" name="completeName" placeholder="Enter your complete name" required>
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" placeholder="Enter your address" required>
            </div>
            
            <div class="form-group">
                <label for="birthdate">Birthdate</label>
                <input type="date" id="birthdate" name="birthdate" required>
            </div>
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                <div id="passwordError" class="error"></div>
            </div>
            
            <button type="submit" style="margin-bottom: 10px;">Register</button>
            <a href="login.html" style="text-decoration: none;">Already have an account? Login</a>
        </form>
    </div>

    <script>
        document.getElementById("registrationForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const errorDiv = document.getElementById("passwordError");

            if (password !== confirmPassword) {
                errorDiv.textContent = "Passwords do not match.";
                return;
            } else {
                errorDiv.textContent = "";
            }

            const completeName = document.getElementById("completeName").value;
            const address = document.getElementById("address").value;
            const birthdate = document.getElementById("birthdate").value;
            const username = document.getElementById("username").value;

            alert("Registration Details:\n" +
                  "Name: " + completeName + "\n" +
                  "Address: " + address + "\n" +
                  "Birthdate: " + birthdate + "\n" +
                  "Username: " + username + "\n" +
                  "Password: " + password);  // Note: Never alert passwords in real apps!
        });
    </script>
</body>
</html>
